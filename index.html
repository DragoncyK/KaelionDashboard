<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kaelion Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login" class="center">
  <button id="loginBtn" class="btn">Login with Discord</button>
</div>

<div id="app" class="hidden">

  <div class="sidebar">
    <h2>Servers</h2>
    <div id="guilds"></div>
  </div>

  <div class="main">

    <h2 id="user"></h2>

    <div class="card">
      <h3>Settings</h3>

      <label>Prefix</label>
      <input id="prefix" type="text">

      <div class="switch">
        <label>Welcome</label>
        <input id="welcome" type="checkbox">
      </div>

      <div class="switch">
        <label>Logs</label>
        <input id="logs" type="checkbox">
      </div>

      <button id="saveBtn" class="btn">Save changes</button>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
