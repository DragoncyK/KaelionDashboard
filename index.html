<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kaelion Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="login-section">
    <button id="loginBtn">Login with Discord</button>
  </div>

  <div id="dashboard" style="display:none;">
    
    <h2 id="user"></h2>

    <div class="layout">

      <div id="guilds" class="sidebar"></div>

      <div class="content">
        <h3>Guild Settings</h3>

        <input id="prefix" placeholder="prefix">
        <br><br>

        <button id="saveBtn">Save</button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
